<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{IDEA_NAME}} - Idea Card</title>
<style>
:root {
  --primary: #023894;
  --accent: #01B2B3;
  --accent-light: #01e0e1;
  --bg: #f8f9fc;
  --text: #1a1a2e;
  --text-light: #6b7280;
  --card-bg: #ffffff;
  --card-shadow: 0 4px 24px rgba(2,56,148,.08);
  --radius: 16px;
  --font: "PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font);color:var(--text);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;line-height:1.7}

.card{
  max-width:720px;width:100%;
  background:var(--card-bg);border-radius:var(--radius);
  box-shadow:var(--card-shadow);overflow:hidden;
  opacity:0;transform:translateY(24px);
  animation:cardIn .6s ease forwards;
}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}

/* ---- HEADER ---- */
.card-header{
  background:linear-gradient(135deg,#023894 0%,#0145c6 40%,#01B2B3 100%);
  color:#fff;padding:48px 40px 40px;position:relative;overflow:hidden;
}
.card-header::before{
  content:'';position:absolute;top:-40%;right:-20%;width:60%;height:160%;
  background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 60%);
  pointer-events:none;
}
.badge{
  display:inline-block;padding:4px 14px;border:1px solid rgba(255,255,255,.3);
  border-radius:99px;font-size:12px;letter-spacing:1.5px;margin-bottom:20px;
  backdrop-filter:blur(4px);position:relative;
}
.card-header h1{
  font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;line-height:1.3;
  position:relative;margin-bottom:12px;
}
.card-header .one-liner{
  font-size:1.05rem;opacity:.88;position:relative;max-width:560px;
}

/* ---- BODY ---- */
.card-body{padding:40px}

.field{margin-bottom:28px;opacity:0;transform:translateY(16px);animation:fieldIn .5s ease forwards}
.field:nth-child(1){animation-delay:.15s}
.field:nth-child(2){animation-delay:.25s}
.field:nth-child(3){animation-delay:.35s}
.field:nth-child(4){animation-delay:.45s}
.field:nth-child(5){animation-delay:.55s}
.field:nth-child(6){animation-delay:.65s}
.field:nth-child(7){animation-delay:.75s}
@keyframes fieldIn{to{opacity:1;transform:translateY(0)}}

.field-label{
  font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--accent);margin-bottom:6px;
}
.field-value{font-size:1rem;color:var(--text)}
.field-value strong{color:var(--primary)}

/* ---- MVP BOX ---- */
.mvp-box{
  background:linear-gradient(135deg,rgba(2,56,148,.04),rgba(1,178,179,.06));
  border:1px dashed rgba(1,178,179,.3);border-radius:12px;
  padding:24px 28px;margin-top:8px;
}
.mvp-box .field-label{color:var(--primary)}
.mvp-box .field-value{font-size:.95rem}

/* ---- FOOTER ---- */
.card-footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 40px;border-top:1px solid #eef0f4;
  font-size:.85rem;color:var(--text-light);
}
.card-footer .step-tag{
  display:inline-block;padding:4px 12px;background:rgba(2,56,148,.06);
  color:var(--primary);border-radius:6px;font-weight:600;font-size:.8rem;
}

/* ---- RESPONSIVE ---- */
@media(max-width:560px){
  body{padding:20px 12px}
  .card-header{padding:32px 24px 28px}
  .card-body{padding:28px 24px}
  .card-footer{padding:16px 24px;flex-direction:column;gap:8px}
}

/* ---- PRINT ---- */
@media print{
  body{padding:0;background:#fff}
  .card{box-shadow:none;border:1px solid #e5e7eb;animation:none;opacity:1;transform:none}
  .field{animation:none;opacity:1;transform:none}
}
</style>
</head>
<body>

<div class="card">
  <!-- HEADER -->
  <div class="card-header">
    <div class="badge">IDEA CARD</div>
    <h1>{{IDEA_NAME}}</h1>
    <div class="one-liner">{{ONE_LINER}}</div>
  </div>

  <!-- BODY -->
  <div class="card-body">
    <div class="field">
      <div class="field-label">Target Users</div>
      <div class="field-value">{{TARGET_USERS}}</div>
    </div>

    <div class="field">
      <div class="field-label">Core Problem</div>
      <div class="field-value">{{CORE_PROBLEM}}</div>
    </div>

    <div class="field">
      <div class="field-label">Existing Solutions</div>
      <div class="field-value">{{EXISTING_SOLUTIONS}}</div>
    </div>

    <div class="field">
      <div class="field-label">Differentiation</div>
      <div class="field-value">{{DIFFERENTIATION}}</div>
    </div>

    <div class="field">
      <div class="field-label">Expected Value</div>
      <div class="field-value">{{EXPECTED_VALUE}}</div>
    </div>

    <div class="mvp-box">
      <div class="field-label">MVP Validation</div>
      <div class="field-value">{{MVP_VALIDATION}}</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="card-footer">
    <span class="step-tag">Step 2 / 5</span>
    <span>{{DATE}}</span>
  </div>
</div>

</body>
</html>
